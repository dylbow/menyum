<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Menyum">
  <meta name="theme-color" content="#667eea">
  <meta name="description" content="Save and order your favorite meals from your favorite restaurants">
  
  <!-- Cache busting for PWA -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <title>Menyum - Your Favorite Orders</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json?v=2">
  
  <!-- iOS Icons -->
  <link rel="apple-touch-icon" href="icons/icon-152x152.png?v=2">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png?v=2">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16x16.png">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app"></div>
  
  <script>
    // Clear cache on reset
    if (location.search.includes('reset')) {
      localStorage.clear();
      if (navigator.serviceWorker) {
        navigator.serviceWorker.getRegistrations().then(r => r.forEach(sw => sw.unregister()));
      }
      if (window.caches) {
        caches.keys().then(k => k.forEach(c => caches.delete(c)));
      }
      history.replaceState(null, '', location.pathname);
    }
    
    // Unregister old service workers to prevent caching issues
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
    }
    if (window.caches) {
      caches.keys().then(k => k.forEach(c => caches.delete(c)));
    }
  </script>
  
  <script src="app.js"></script>
</body>
</html>
